server.port=8082

spring.data.mongodb.uri=mongodb://localhost:27017
spring.data.mongodb.database=fitness_activity

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RabbitMQ configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.default-requeue-rejected=false
rabbitmq.exchange.name=fitness.exchange
rabbitmq.queue.name=activity.queue
rabbitmq.routing.key=activity.tracking

#Google gemini configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.project-id=${GEMINI_PROJECT_ID}
spring.ai.google.genai.chat.options.model=gemini-3-flash-preview